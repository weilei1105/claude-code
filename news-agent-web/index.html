<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="基于 AI 的智能报告生成平台，自动抓取最新资讯并生成结构化分析报告">
  <meta name="keywords" content="AI报告生成, 新闻分析, 行业报告, 智能写作">
  <meta name="author" content="News Agent Web">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="智能报告生成器 - News Agent Web">
  <meta property="og:description" content="基于 Scrapling + Claude AI 的专业报告生成系统">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">

  <!-- Preconnect to API -->
  <link rel="preconnect" href="/api">

  <title>智能报告生成器 - News Agent Web</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f8fafc;
      color: #1a1a2e;
    }
    #app {
      min-height: 100vh;
    }
    /* Initial loading state */
    .app-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-size: 1.125rem;
      color: #64748b;
    }
    .app-loading::after {
      content: '';
      width: 20px;
      height: 20px;
      margin-left: 12px;
      border: 2px solid #e2e8f0;
      border-top-color: #0f3460;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app" class="app-loading">加载中</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
